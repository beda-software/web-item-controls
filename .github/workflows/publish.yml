name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Prepare config
        run: cp contrib/emr-config/config.local.js contrib/emr-config/config.js

      - name: Install deps
        run: yarn install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Extract Lingui messages
        run: yarn extract

      - name: Compile Lingui catalogs
        run: yarn compile

      - name: Build package
        run: yarn build:lib

      - name: Check package output
        run: yarn check:package

      - name: Smoke test package tarball
        run: yarn smoke:package

      - name: Allow registry publish
        run: npm pkg delete private

      - name: Publish package
        run: npm publish --ignore-scripts --access public
