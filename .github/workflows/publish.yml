name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: yarn

      - name: Prepare config
        run: cp contrib/emr-config/config.local.js contrib/emr-config/config.js

      - name: Install deps
        run: yarn install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Extract Lingui messages
        run: yarn extract

      - name: Compile Lingui catalogs
        run: yarn compile

      - name: Build package
        run: yarn build:lib

      - name: Allow registry publish
        run: npm pkg delete private

      - name: Publish package
        run: npm publish --ignore-scripts --access public --tag latest --provenance
